name: AI-BankApp DevSecOps Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'k8s/**' 
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ai-bankapp-eks

permissions:
  contents: write
  security-events: write
  id-token: write

jobs:

# =========================================================
# GATE 1 — SECRET SCANNING
# =========================================================

  gitleaks:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Gitleaks needs full history to scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =========================================================
# GATE 2 — LINT - Java Checkstyle
# =========================================================

  lint:
    name: Lint - Checkstyle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check || true # Audit mode for now to avoid blocking on style

# =========================================================
# GATE 3 — SAST (CODEQL)
# =========================================================

  sast:
    name: "Gate 3 - SAST (CodeQL)"
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL
        run: |
          mvn clean package \
          -DskipTests \
          --no-transfer-progress

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

# =========================================================
# GATE 4 — SCA (OWASP DEPENDENCY CHECK)
# =========================================================

  sca:
    name: "Gate 4 - SCA (OWASP Dependency Check)"
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Cache OWASP/NVD Database
      - name: Cache OWASP Dependency DB
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.dependency-check
          key: owasp-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-${{ runner.os }}

      - name: Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -Dformat=HTML \
          -DskipTests \
          -DfailBuildOnCVSS=7 \
          --no-transfer-progress

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check-report.html
# ============================================================
# GATE 5: BUILD
# ============================================================
  build-and-test:
    name: "Gate 5 - Build & Test"
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Run tests
        run: ./mvnw test -B
        continue-on-error: true
# =========================================================
# GATE 6 — DOCKER BUILD
# =========================================================

  docker-build:
    name: "Gate 6 - Docker Build"
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

# =========================================================
# GATE 7 — CONTAINER SECURITY
# =========================================================

  trivy:
    name: "Gate 7 - Trivy Container Scan"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha_short }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

# =========================================================
# GATE 8 — PUSH IMAGE
# =========================================================

  push-image:
    name: "Gate 8 - Push Docker Image"
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{secrets.DOCKERHUB_USERNAME}}/${{env.IMAGE_NAME}}:latest
            ${{secrets.DOCKERHUB_USERNAME}}/${{env.IMAGE_NAME}}:${{ steps.tag.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =========================================================
# GATE 9 — GITOPS UPDATE
# =========================================================

  gitops-update:
    name: "Gate 9 - GitOps Deployment"
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4

      - name: Update Kubernetes Manifest
        run: |
          sed -i 's|image: .*|image: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha_short }}|" k8s/bankapp-deployment.yml

      - name: Commit Updated Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/bankapp-deployment.yml
          git diff --staged --quiet || git commit -m "ci: update bankapp image to ${{ steps.tag.outputs.sha_short }} [skip ci]"
          git push
