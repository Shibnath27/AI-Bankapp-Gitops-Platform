name: AI-BankApp DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ai-bankapp
  REGISTRY: docker.io

permissions:
  contents: read
  security-events: write

jobs:

# =========================================================
# GATE 1 — SECRET SCANNING
# =========================================================

  gitleaks:
    name: "Gate 1 - Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

# =========================================================
# GATE 2 — BUILD + UNIT TEST
# =========================================================

  build:
    name: "Gate 2 - Maven Build & Test"
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Application
        run: |
          mvn clean verify \
          --no-transfer-progress

# =========================================================
# GATE 3 — SAST (CODEQL)
# =========================================================

  sast:
    name: "Gate 3 - SAST (CodeQL)"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL
        run: |
          mvn clean package \
          -DskipTests \
          --no-transfer-progress

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

# =========================================================
# GATE 4 — SCA (OWASP DEPENDENCY CHECK)
# =========================================================

  sca:
    name: "Gate 4 - SCA (OWASP Dependency Check)"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Cache OWASP/NVD Database
      - name: Cache OWASP Dependency DB
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.dependency-check
          key: owasp-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-${{ runner.os }}

      - name: Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -Dformat=HTML \
          -DskipTests \
          -DfailBuildOnCVSS=7 \
          --no-transfer-progress

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check-report.html

# =========================================================
# GATE 5 — DOCKER BUILD
# =========================================================

  docker-build:
    name: "Gate 5 - Docker Build"
    runs-on: ubuntu-latest
    needs:
      - sast
      - sca

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

# =========================================================
# GATE 6 — CONTAINER SECURITY
# =========================================================

  trivy:
    name: "Gate 6 - Trivy Container Scan"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

# =========================================================
# GATE 7 — PUSH IMAGE
# =========================================================

  push-image:
    name: "Gate 7 - Push Docker Image"
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker tag \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

# =========================================================
# GATE 8 — GITOPS UPDATE
# =========================================================

  gitops-update:
    name: "Gate 8 - GitOps Deployment"
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4

      - name: Update Kubernetes Manifest
        run: |
          sed -i 's|image: .*|image: '${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'|' k8s/bankapp-deployment.yml

      - name: Commit Updated Manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          git commit -m "ci: update bankapp image to ${{ github.sha }}" || echo "No changes"

          git push
