name: DevSecOps Main Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'k8s/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  security-events: write

jobs:
  # ============================================================
  # STAGE 1: CI - Security Scanning (SAST + SCA)
  # ============================================================
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ============================================================
  # STAGE 2: Build - Maven + Trivy + Docker Push
  # ============================================================
  build:
    needs: ci
    uses: ./.github/workflows/gitops-ci.yml
    secrets: inherit

 